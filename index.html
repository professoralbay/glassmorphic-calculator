<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphic 3D Calculator</title>

  <style>
    /* =============================================
       RESET
       ============================================= */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* =============================================
       BODY — deep purple gradient + floating orbs
       ============================================= */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Ambient glow orb — top-left purple */
    body::before {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      background: rgba(120, 60, 220, 0.35);
      border-radius: 50%;
      filter: blur(80px);
      top: -80px; left: -80px;
      pointer-events: none;
    }

    /* Ambient glow orb — bottom-right cyan */
    body::after {
      content: '';
      position: fixed;
      width: 350px; height: 350px;
      background: rgba(0, 180, 255, 0.25);
      border-radius: 50%;
      filter: blur(80px);
      bottom: -60px; right: -60px;
      pointer-events: none;
    }

    /* =============================================
       CONTAINER — VanillaTilt.js target
       Wraps the calculator for 3D tilt effect
       ============================================= */
    .container {
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
    }

    /* =============================================
       CALCULATOR — glassmorphism card
       ============================================= */
    .calculator {
      width: 300px;
      padding: 24px;
      border-radius: 24px;

      /* Frosted glass effect */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);

      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;

      /* Lift above the tilt plane */
      transform: translateZ(20px);
    }

    /* =============================================
       DISPLAY INPUT
       ============================================= */
    .value {
      grid-column: 1 / -1;       /* spans all 4 columns */
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      padding: 14px 16px;
      text-align: right;
      outline: none;
      width: 100%;
      caret-color: transparent;  /* hide blinking cursor */
      transition: border-color 0.3s;
    }
    .value:focus { border-color: rgba(180, 120, 255, 0.5); }

    /* =============================================
       BASE BUTTON STYLE
       ============================================= */
    .num {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      user-select: none;

      transition:
        background    0.2s,
        transform     0.15s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow    0.2s,
        border-color  0.2s;

      /* Push button forward in 3D space */
      transform: translateZ(10px);
    }

    .num:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.28);
      transform: translateZ(18px) scale(1.06);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .num:active {
      transform: translateZ(6px) scale(0.94);
      background: rgba(255, 255, 255, 0.06);
    }

    /* =============================================
       CLEAR BUTTON — red accent
       ============================================= */
    .num.clear {
      background: rgba(255, 60, 80, 0.2);
      border-color: rgba(255, 60, 80, 0.3);
      color: #ff6b7a;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    .num.clear:hover {
      background: rgba(255, 60, 80, 0.38);
      border-color: rgba(255, 60, 80, 0.55);
      box-shadow: 0 0 20px rgba(255, 60, 80, 0.25);
    }

    /* =============================================
       PLUS BUTTON — taller (spans 2 rows), purple
       ============================================= */
    .num.plus {
      grid-row: span 2;
      background: rgba(120, 80, 255, 0.22);
      border-color: rgba(140, 100, 255, 0.35);
      color: #c4a0ff;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .num.plus:hover {
      background: rgba(120, 80, 255, 0.4);
      box-shadow: 0 0 24px rgba(120, 80, 255, 0.3);
    }

    /* =============================================
       EQUALS BUTTON — gradient, wide
       ============================================= */
    .num.equal {
      background: linear-gradient(135deg, #7b2ff7, #0097ff);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(123, 47, 247, 0.45);
      letter-spacing: 0.05em;
    }
    .num.equal:hover {
      background: linear-gradient(135deg, #9040ff, #00c3ff);
      box-shadow: 0 6px 28px rgba(123, 47, 247, 0.65);
      transform: translateZ(22px) scale(1.06);
    }
    .num.equal:active {
      transform: translateZ(8px) scale(0.95);
    }

    /* VanillaTilt injects a .js-tilt-glare div — match border-radius */
    .js-tilt-glare { border-radius: 24px; }
  </style>
</head>
<body>

  <!--
    HTML structure mirrors smrtpage/Glassmorphic-3D-Calculator.
    VanillaTilt targets .container for 3D mouse-tilt effect.
    Calculator logic uses the native `eval()` via inline onclick.
  -->
  <div class="container">
    <form class="calculator" name="calc">

      <!-- Read-only display -->
      <input type="text" readonly class="value" name="txt" />

      <!-- Row 1: Clear, divide, multiply -->
      <span class="num clear" onclick="calc.txt.value = ''">C</span>
      <span class="num"       onclick="document.calc.txt.value += '/'">/</span>
      <span class="num"       onclick="document.calc.txt.value += '*'">×</span>

      <!-- Row 2: 7, 8, 9, minus -->
      <span class="num" onclick="document.calc.txt.value += '7'">7</span>
      <span class="num" onclick="document.calc.txt.value += '8'">8</span>
      <span class="num" onclick="document.calc.txt.value += '9'">9</span>
      <span class="num" onclick="document.calc.txt.value += '-'">−</span>

      <!-- Row 3: 4, 5, 6 + plus (spans rows 3-4) -->
      <span class="num" onclick="document.calc.txt.value += '4'">4</span>
      <span class="num" onclick="document.calc.txt.value += '5'">5</span>
      <span class="num" onclick="document.calc.txt.value += '6'">6</span>
      <span class="num plus" onclick="document.calc.txt.value += '+'">+</span>

      <!-- Row 4: 1, 2, 3 (plus already spans here) -->
      <span class="num" onclick="document.calc.txt.value += '1'">1</span>
      <span class="num" onclick="document.calc.txt.value += '2'">2</span>
      <span class="num" onclick="document.calc.txt.value += '3'">3</span>

      <!-- Row 5: 0, 00, dot, equals -->
      <span class="num" onclick="document.calc.txt.value += '0'">0</span>
      <span class="num" onclick="document.calc.txt.value += '00'">00</span>
      <span class="num" onclick="document.calc.txt.value += '.'">.</span>
      <span class="num equal" onclick="document.calc.txt.value = eval(calc.txt.value)">=</span>

    </form>
  </div>

  <!-- VanillaTilt — adds 3D mouse-tracking tilt to .container -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
  <script>
    // Initialise VanillaTilt — same config as original repo
    VanillaTilt.init(document.querySelectorAll(".container"), {
      max: 25,          // maximum tilt angle in degrees
      speed: 400,       // transition speed (ms)
      glare: true,      // enable shine / glare effect
      "max-glare": 0.2, // glare opacity cap
    });

    // =============================================
    // KEYBOARD SUPPORT (bonus — not in original)
    // Allows typing numbers and operators directly
    // =============================================
    document.addEventListener('keydown', e => {
      const allowed = '0123456789+-*/.';

      if (allowed.includes(e.key)) {
        // Append digit or operator
        document.calc.txt.value += e.key;

      } else if (e.key === 'Enter' || e.key === '=') {
        // Evaluate expression
        try {
          document.calc.txt.value = eval(document.calc.txt.value);
        } catch {
          document.calc.txt.value = 'Error';
        }

      } else if (e.key === 'Backspace') {
        // Remove last character
        document.calc.txt.value =
          document.calc.txt.value.slice(0, -1);

      } else if (e.key === 'Escape') {
        // Clear display
        document.calc.txt.value = '';
      }
    });
  </script>

</body>
</html>
